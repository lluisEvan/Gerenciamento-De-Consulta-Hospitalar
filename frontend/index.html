<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Hospital - Cadastro e Agendamento</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #res { margin-top: 20px; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Novo Atendimento</h2>
        <div class="grid">
            <div class="full">
                <label>Nome Completo:</label>
                <input type="text" id="nome">
            </div>
            <div>
                <label>CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
            <div>
                <label>Data de Nascimento:</label>
                <input type="date" id="nascimento">
            </div>
            <div class="full">
                <label>Telefone:</label>
                <input type="text" id="telefone" placeholder="(86) 9....-....">
            </div>
            <div class="full">
                <label>Especialidade Desejada:</label>
                <select id="especialidade">
                    <option value="Cardiologia">Cardiologia</option>
                    <option value="Pediatria">Pediatria</option>
                    <option value="Clínico Geral">Clínico Geral</option>
                </select>
            </div>
        </div>
        <button onclick="salvarTudo()">Cadastrar e Agendar</button>
        <div id="res"></div>
    </div>

    <script>
        async function salvarTudo() {
            const resDiv = document.getElementById('res');
            const payload = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                data_nascimento: document.getElementById('nascimento').value,
                telefone: document.getElementById('telefone').value,
                especialidade: document.getElementById('especialidade').value
            };

            try {
                const response = await fetch('http://localhost:3000/agendar-completo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resDiv.style.display = 'block';
                resDiv.innerText = data.mensagem;
                resDiv.style.backgroundColor = data.status === 'sucesso' ? '#d4edda' : '#f8d7da';
                resDiv.style.color = data.status === 'sucesso' ? '#155724' : '#721c24';
            } catch (err) {
                alert("Erro ao conectar com a API.");
            }
        }
    </script>
</body>
</html>
